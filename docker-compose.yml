services:
  contexta-backend-prod:
    image: ghcr.io/sgupta005/contexta-backend:prod-latest
    container_name: contexta-backend-prod
    restart: unless-stopped
    env_file: ./.env.prod
    ports:
      - "8000:8000"
    mem_limit: 800m
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  contexta-backend-dev:
    image: ghcr.io/sgupta005/contexta-backend:dev-latest
    container_name: contexta-backend-dev
    restart: unless-stopped
    env_file: ./.env.dev
    ports:
      - "8001:8000"
    mem_limit: 800m
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
